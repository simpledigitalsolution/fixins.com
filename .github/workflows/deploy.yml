# Deploy to GoDaddy cPanel hosting via FTP
#
# REQUIRED GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    - your FTP hostname, e.g. ftp.fixinsapp.com
#   FTP_USERNAME  - your cPanel FTP username
#   FTP_PASSWORD  - your cPanel FTP password
#
# This workflow assumes the FTP user is rooted at the active web document root.
# For dedicated/chrooted users, keep server-dir as ./

name: Deploy to GoDaddy cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Build static site
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build

      - name: Skip deploy until site code exists
        if: ${{ hashFiles('package.json') == '' }}
        run: echo "No package.json found yet. Skipping deploy for now."

      - name: Deploy to GoDaddy via FTP
        if: ${{ hashFiles('package.json') != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./
          dangerous-clean-slate: false
